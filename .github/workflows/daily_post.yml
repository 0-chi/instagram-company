name: 不動産あるある 毎日自動投稿

on:
  schedule:
    # UTC 00:00 = JST 09:00 に毎日実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '画像生成のみ（投稿しない）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      episode:
        description: 'エピソード番号を強制指定（空欄で自動）'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily post
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          IMGBB_API_KEY:             ${{ secrets.IMGBB_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ -n "${{ github.event.inputs.episode }}" ]; then
            ARGS="$ARGS --episode ${{ github.event.inputs.episode }}"
          fi
          python scripts/run_daily.py $ARGS

      - name: Upload generated image (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-image-${{ github.run_number }}
          path: output/
          retention-days: 7
